<div class="timer-widget" [class.expanded]="isExpanded">

  <div class="timer-collapsed" (click)="toggleExpand()">
    <span class="timer-icon">🍅</span>
    <span class="timer-time">{{display}}</span>
    <span class="timer-arrow">{{ isExpanded ? '▲' : '▼' }}</span>
  </div>

  <div class="timer-body" *ngIf="isExpanded">
    <div class="timer-label">{{ isBreak ? '☕ Break' : '📚 Work' }}</div>

    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="progress"></div>
    </div>

    <div class="timer-big">{{display}}</div>

    <div class="timer-controls">
      <button (click)="startStop()">{{ isRunning ? 'Pause' : 'Start' }}</button>
      <button (click)="reset()">Reset</button>
    </div>

    <div class="timer-settings">
      <div class="setting-row">
        <label>Work (min)</label>
        <input type="number" [(ngModel)]="workMinutes" min="1" max="60"
               (change)="onSettingsChange()">
      </div>
      <div class="setting-row">
        <label>Break (min)</label>
        <input type="number" [(ngModel)]="breakMinutes" min="1" max="30"
               (change)="onSettingsChange()">
      </div>
    </div>
  </div>
</div>

<hr>
<button (click)="toggle()">Dark Mode</button>
