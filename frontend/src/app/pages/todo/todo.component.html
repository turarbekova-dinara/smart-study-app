<div class="container">
  <div class="todo-app">
    <h1>To-Do List</h1>

    <div class="row">
      <input [(ngModel)]="newTask" placeholder="Enter your text" />
      <button (click)="addTask()">Add</button>
    </div>

    <ul>
      <li *ngFor="let task of tasks">
        {{ task.title }}
        <span (click)="deleteTask(task.id)">❌</span>
      </li>
    </ul>

  </div>
</div>
