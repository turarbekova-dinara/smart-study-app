<div class="lecture">
  <h2>Interesting lecture</h2>
  <input
    type="text"
    placeholder="Paste lecture link here"
    [(ngModel)]="lectureLink">
  <button (click)="loadLecture()">
    Open Lecture
  </button>
  <div class="lecture-viewer" *ngIf="safeLectureLink">
    <iframe
      width="100%"
      height="300"
      [src]="safeLectureLink">
    </iframe>
  </div>
  <!-- subway surfers video -->
  <div class="video">
    <iframe
      width="100%"
      height="300"
      src="https://www.youtube.com/embed/vTfD20dbxho"
      title="Subway Surfers Gameplay"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>

    </iframe>
  </div>
</div>
